<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galletas Folatokfe</title>
  <link rel="stylesheet" href="Pagina2.css" />
</head>
<body>
 
  <!-- Notificaciones toast -->
  <div id="toasts" aria-live="polite"></div>
 
  <!-- Overlay del sidebar -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
 
  <!-- Sidebar lateral -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="logo-emoji">🍪</span>
      <div>
        <div class="sidebar-brand">FOLATOKFE</div>
        <div class="sidebar-tagline">Galletas artesanales</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-user-panel"></div>
  </aside>
 
  <!-- Navbar fijo -->
  <header id="navbar">
    <div class="navbar-bar">
      <div class="navbar-left">
        <button class="icon-btn" onclick="toggleSidebar()" aria-label="Abrir menú">
          <svg id="menu-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <a href="#/" class="brand-link">
          <span class="logo-emoji" style="font-size:2rem">🍪</span>
          <span class="brand-name">FOLATOKFE</span>
        </a>
      </div>
      <div class="navbar-right">
        <!-- Búsqueda -->
        <button class="icon-btn" onclick="toggleSearch()" aria-label="Buscar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <!-- Carrito -->
        <button class="icon-btn cart-btn" onclick="navigate('/cart')" aria-label="Carrito">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-count" class="cart-badge" style="display:none">0</span>
        </button>
        <!-- Usuario -->
        <div class="user-btn-wrap">
          <button class="icon-btn" onclick="toggleUserMenu()" aria-label="Usuario">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="admin-badge" class="admin-badge" style="display:none">AD</span>
          </button>
          <div id="user-menu" class="user-dropdown" style="display:none"></div>
          <div id="user-overlay" style="display:none;position:fixed;inset:0;z-index:149" onclick="closeUserMenu()"></div>
        </div>
      </div>
    </div>
 
    <!-- Banner de envíos -->
    <div class="delivery-banner">Hacemos envíos a todo Cúcuta</div>
 
    <!-- Barra de búsqueda expandible -->
    <div id="search-bar" class="search-bar" style="display:none">
      <div class="search-inner">
        <input type="text" id="search-input" placeholder="Buscar productos..." oninput="handleSearch(this.value)" autocomplete="off" />
        <div id="search-results" class="search-results" style="display:none"></div>
      </div>
    </div>
  </header>
 
  <!-- Espaciador para compensar el navbar fijo -->
  <div class="navbar-spacer"></div>
 
  <!-- Contenido de páginas (renderizado dinámicamente) -->
  <main id="content"></main>
 
  <script src="Pagina.scrip.js"></script>
</body>
</html>
